# 单项评估默认玩家 / Default player for single-model evaluation
player: heuristic
# 单项评估默认敌人 / Default enemy for single-model evaluation
enemy: random
# 默认评估局数 / Default number of evaluation episodes
episodes: 100
# 随机种子，留空表示每次随机 / Random seed; leave empty for non-fixed runs
seed:
# GUI 输出目录，留空则自动写入 outputs/experiments/<timestamp>/；CSV 文件名由系统生成 / GUI output directory; leave empty to auto-save under outputs/experiments/<timestamp>/; CSV filename is generated by the system
output:
# 单局最大步数，防止极端对局无限运行 / Max steps per episode to prevent runaway games
max_steps: 10000
